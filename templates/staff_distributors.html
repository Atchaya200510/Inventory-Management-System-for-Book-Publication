<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Distributors</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">Inventory</h2>
        <nav>
           <a href="/staff_dashboard">Dashboard</a>
           <a href="/add_book">Add Books</a>
            <a href="/staff/view_books">View Books</a>
            <a href="/stock_manage">Stock In / Out</a>
            <a href="/staff_distributors" class="active">Manage Distributors</a>
            <a href="/logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="page-center">

            <div class="glass-card compact-card">

                <h2>Manage Distributors</h2>

                <form method="POST" action="/add_distributor" class="form-stack">
                    <input type="text" name="name" placeholder="Distributor Name" required>
                    <input type="text" name="contact" placeholder="Contact Info">
                    <input type="text" name="address" placeholder="Address">
                    <button type="submit">Add Distributor</button>
                </form>

                <h3 class="sub-title">Existing Distributors</h3>
                <div class="table-wrapper">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Address</th>
                            </tr>
                        </thead>
                        <tbody id="distributorTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </main>

</div>

<script>
fetch('/api/distributors')
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById('distributorTableBody');
        tbody.innerHTML = "";

        data.forEach(d => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${d.name}</td>
                <td>${d.contact || '-'}</td>
                <td>${d.address || '-'}</td>
            `;
            tbody.appendChild(row);
        });
    });
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
